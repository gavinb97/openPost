name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    working-directory: ./v2

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=packages/shared

      - name: Build API
        run: npx tsc --project apps/api/tsconfig.json --noEmit

      - name: Build Worker
        run: npx tsc --project apps/worker/tsconfig.json --noEmit

      - name: Build Web
        run: npx next build
        working-directory: ./v2/apps/web
        env:
          NEXT_TELEMETRY_DISABLED: '1'

  docker:
    needs: lint-and-build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker compose build
        working-directory: ./v2
