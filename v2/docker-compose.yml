version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "5055:5055"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/shared/src:/app/packages/shared/src

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./apps/worker/src:/app/apps/worker/src
      - ./packages/shared/src:/app/packages/shared/src

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3333:3333"
    env_file: .env
    environment:
      - PORT=3333
    depends_on:
      - api

volumes:
  redis_data:
