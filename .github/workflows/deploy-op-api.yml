name: Deploy OnlyPosts API

on:
  push:
    branches:
      - main
    paths:
      - 'v2/apps/api/**'
      - 'v2/packages/shared/**'
      - 'v2/database/**'
      - '.github/workflows/deploy-op-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/onlyposts-api:latest -f ./v2/apps/api/Dockerfile ./v2
          docker push ${{ secrets.DOCKER_USERNAME }}/onlyposts-api:latest

      - name: Create Docker network
        run: docker network create haypi-network 2>/dev/null || true

      - name: Stop old container
        run: |
          docker stop onlyposts-api 2>/dev/null || true
          docker rm onlyposts-api 2>/dev/null || true

      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/onlyposts-api:latest

      - name: Deploy API container
        run: |
          docker run -d \
            --name onlyposts-api \
            --network haypi-network \
            --restart unless-stopped \
            -p 5055:5055 \
            --env-file ~/onlyposts/.env \
            -e REDIS_URL=redis://walletvote-redis:6379 \
            ${{ secrets.DOCKER_USERNAME }}/onlyposts-api:latest

      - name: Verify deployment
        run: |
          echo "⏳ Waiting for API..."
          sleep 5
          echo "API:" && curl -sf http://localhost:5055/api/v2/health | head -c 200 || echo "⚠️ API not ready yet"
          echo ""
          echo "Running containers:"
          docker ps --filter "name=onlyposts" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Cleanup old images
        run: docker image prune -f
